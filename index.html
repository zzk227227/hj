<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <!-- 关键：让页面在移动端自适应，禁止缩放 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>红色警戒-张泽凯专版</title>
    
    <style>
        /* 去掉所有默认边距，让页面撑满屏幕 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden; /* 禁止页面本身滚动，让滚动发生在游戏内部 */
            background: #000;
        }

        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>
    <!-- 把游戏网站嵌入，并允许全屏、自动播放等功能 -->
    <iframe 
        src="https://staging.wangerhuoda.cn/"
        allowfullscreen="true"
        allow="autoplay; fullscreen; accelerometer; gyroscope"
        sandbox="allow-scripts allow-same-origin allow-modals allow-forms allow-popups">
    </iframe>
</body>
</html>
